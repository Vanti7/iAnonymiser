name: Demo GIF

# Regenerates docs/demo.gif whenever anything that could change what the
# recording shows is touched (the tape itself, its input fixture, or the
# anonymization engine/CLI it drives), and opens a PR with the result
# instead of pushing to master directly (master requires CODEOWNERS review).
#
# The tape drives cli.py directly against core.Anonymizer, so this job needs
# no Docker build/Flask server — just the Python stdlib and the repo itself.

on:
  push:
    branches: [master]
    paths:
      - 'docs/demo.tape'
      - 'docs/demo-source.txt'
      - 'cli.py'
      - 'pyproject.toml'
      - 'core/**'
      - 'patterns/**'
      - 'presets/**'
      - 'enhancers/**'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install VHS, ttyd and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          curl -sL -o /usr/local/bin/ttyd \
            https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64
          chmod +x /usr/local/bin/ttyd
          go install github.com/charmbracelet/vhs@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
        # Not using charmbracelet/vhs-action here: its bundled ffmpeg installer
        # looks for a hardcoded BtbN/FFmpeg-Builds asset name tied to ffmpeg 5.1
        # that no longer exists in their latest release, so it always fails
        # ("Error: Failed to install ffmpeg"). Installing the three tools
        # ourselves sidesteps that bug.

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install iAnonymiser (provides the anonymize/deanonymize commands)
        run: pip install -e .

      - name: Render docs/demo.tape
        run: vhs docs/demo.tape

      - name: Open PR with the regenerated GIF
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: regenerate demo.gif [skip ci]"
          title: "chore: regenerate demo.gif"
          body: |
            Automated re-render of `docs/demo.gif` from `docs/demo.tape`,
            triggered by changes affecting what the recording shows.
          branch: bot/update-demo-gif
          add-paths: docs/demo.gif
