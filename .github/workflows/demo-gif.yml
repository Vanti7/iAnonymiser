name: Demo GIF

# Regenerates docs/demo.gif whenever anything that could change what the
# recording shows is touched (the tape itself, or the anonymization
# engine/API/image it drives against), and opens a PR with the result
# instead of pushing to master directly (master requires CODEOWNERS review).

on:
  push:
    branches: [master]
    paths:
      - 'docs/demo.tape'
      - 'docs/demo-source.txt'
      - 'core/**'
      - 'patterns/**'
      - 'presets/**'
      - 'enhancers/**'
      - 'api/**'
      - 'app.py'
      - 'Dockerfile'
      - 'requirements.txt'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ianonymiser:demo-gif .

      - name: Start container
        run: docker run -d --name ianonymiser -p 5000:5000 ianonymiser:demo-gif

      - name: Wait for the app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/ > /dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time" >&2
          docker logs ianonymiser
          exit 1

      - name: Render docs/demo.tape
        uses: charmbracelet/vhs-action@v2
        with:
          path: docs/demo.tape

      - name: Stop container
        if: always()
        run: docker rm -f ianonymiser

      - name: Open PR with the regenerated GIF
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: regenerate demo.gif [skip ci]"
          title: "chore: regenerate demo.gif"
          body: |
            Automated re-render of `docs/demo.gif` from `docs/demo.tape`,
            triggered by changes affecting what the recording shows.
          branch: bot/update-demo-gif
          add-paths: docs/demo.gif
